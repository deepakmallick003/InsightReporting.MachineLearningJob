trigger:
  - development
  - release/*
      
resources:
  repositories:
    - repository: self
    - repository: deployments
      ref: feature/AKS/init
      type: git
      name: Cabi.Kubernetes.Deployment.2021

stages:
- template: microservice.yaml@deployments
  parameters:
    REPOSITORY_NAME: 'PlantwisePlus.InsightReporting.MicroService.MachineLearningJob'
    PROJECTS:
      - "insightreportingml.job"
    BUILD_ID: $(Build.BuildNumber)